# Firi Trading Platform Integration Documentation
# This file contains the integration architecture and sequence diagrams

integration:
  name: "Firi Trading Platform Integration"
  version: "1.0.0"
  description: "Complete integration with Firi trading platform for crypto trading bot"
  
  components:
    - name: "Trading Engine"
      description: "Main trading bot engine"
      location: "src/engine.py"
      
    - name: "Firi Exchange"
      description: "Firi API integration layer"
      location: "src/exchange/firi_exchange.py"
      
    - name: "Data Manager"
      description: "Data persistence and management"
      location: "src/data_manager.py"
      
    - name: "Strategy Module"
      description: "Trading strategy implementations"
      location: "src/strategies/"
      
    - name: "Domain Models"
      description: "Core domain entities"
      location: "src/domain/"
      
    - name: "Configuration"
      description: "API credentials and settings"
      location: "config/firi_config.py"

  api_endpoints:
    - name: "Authentication"
      method: "HMAC-SHA256"
      description: "Secure API authentication"
      
    - name: "Account Info"
      endpoint: "/v1/account"
      method: "GET"
      description: "Get account information"
      
    - name: "Balance"
      endpoint: "/v1/account/balance"
      method: "GET"
      description: "Get account balances"
      
    - name: "Markets"
      endpoint: "/v1/markets"
      method: "GET"
      description: "Get available markets"
      
    - name: "Ticker"
      endpoint: "/v1/ticker/{symbol}"
      method: "GET"
      description: "Get current price data"
      
    - name: "Order Book"
      endpoint: "/v1/orderbook/{symbol}"
      method: "GET"
      description: "Get market depth"
      
    - name: "Historical Data"
      endpoint: "/v1/history/{symbol}"
      method: "GET"
      description: "Get price history"
      
    - name: "Place Order"
      endpoint: "/v1/orders"
      method: "POST"
      description: "Place trading order"
      
    - name: "Cancel Order"
      endpoint: "/v1/orders/{orderId}"
      method: "DELETE"
      description: "Cancel order"
      
    - name: "Get Orders"
      endpoint: "/v1/orders"
      method: "GET"
      description: "Get order history"
      
    - name: "Get Trades"
      endpoint: "/v1/trades"
      method: "GET"
      description: "Get trade history"

  data_flow:
    - step: 1
      description: "Trading Engine initializes"
      components: ["Trading Engine", "Firi Exchange", "Configuration"]
      
    - step: 2
      description: "Load API credentials"
      components: ["Configuration", "Firi Exchange"]
      
    - step: 3
      description: "Authenticate with Firi API"
      components: ["Firi Exchange", "Firi API"]
      
    - step: 4
      description: "Get market data"
      components: ["Trading Engine", "Firi Exchange", "Firi API"]
      
    - step: 5
      description: "Strategy analysis"
      components: ["Trading Engine", "Strategy Module"]
      
    - step: 6
      description: "Generate trading signal"
      components: ["Strategy Module", "Trading Engine"]
      
    - step: 7
      description: "Execute trade"
      components: ["Trading Engine", "Firi Exchange", "Firi API"]
      
    - step: 8
      description: "Store trade data"
      components: ["Trading Engine", "Data Manager", "Firestore"]

  error_handling:
    - type: "Authentication Error"
      description: "Invalid API credentials"
      handling: "Log error and stop trading"
      
    - type: "Rate Limit Error"
      description: "API rate limit exceeded"
      handling: "Implement exponential backoff"
      
    - type: "Network Error"
      description: "Connection issues"
      handling: "Retry with increasing delays"
      
    - type: "Order Error"
      description: "Failed order placement"
      handling: "Log error and continue monitoring"

  security:
    - aspect: "API Credentials"
      protection: "Stored in separate config file, ignored by Git"
      
    - aspect: "API Communication"
      protection: "HMAC-SHA256 signature authentication"
      
    - aspect: "Data Storage"
      protection: "Encrypted Firestore storage"
      
    - aspect: "Logging"
      protection: "No sensitive data in logs"

# Mermaid Sequence Diagram
mermaid_sequence_diagram: |
  sequenceDiagram
    participant TE as Trading Engine
    participant FE as Firi Exchange
    participant FA as Firi API
    participant SM as Strategy Module
    participant DM as Data Manager
    participant FS as Firestore
    participant CF as Config

    Note over TE,FS: Initialization Phase
    TE->>CF: Load API credentials
    CF-->>TE: Return credentials
    TE->>FE: Initialize with credentials
    FE->>FA: Authenticate (HMAC-SHA256)
    FA-->>FE: Authentication response
    FE-->>TE: Exchange ready

    Note over TE,FS: Market Data Collection
    loop Every 60 seconds
        TE->>FE: Get current prices
        FE->>FA: Request ticker data
        FA-->>FE: Return price data
        FE-->>TE: Return market data
        TE->>DM: Store price data
        DM->>FS: Save to Firestore
        FS-->>DM: Confirmation
        DM-->>TE: Data stored
    end

    Note over TE,FS: Strategy Analysis
    TE->>FE: Get historical data
    FE->>FA: Request historical data
    FA-->>FE: Return historical data
    FE-->>TE: Return market data
    TE->>SM: Analyze with strategy
    SM-->>TE: Generate signal (BUY/SELL/None)

    alt Signal Generated
        Note over TE,FS: Trade Execution
        TE->>FE: Execute trade
        FE->>FA: Place order
        FA-->>FE: Order confirmation
        FE-->>TE: Trade executed
        TE->>DM: Store trade data
        DM->>FS: Save trade to Firestore
        FS-->>DM: Trade stored
        DM-->>TE: Trade recorded
    else No Signal
        Note over TE,FS: Continue monitoring
        TE->>TE: Wait for next cycle
    end

    Note over TE,FS: Error Handling
    alt API Error
        FA-->>FE: Error response
        FE->>FE: Log error
        FE-->>TE: Error notification
        TE->>TE: Implement retry logic
    end

    Note over TE,FS: Data Retrieval
    TE->>DM: Get trading statistics
    DM->>FS: Query trade data
    FS-->>DM: Return statistics
    DM-->>TE: Return performance data

# Mermaid Component Diagram
mermaid_component_diagram: |
  graph TB
    subgraph "Trading Bot"
        TE[Trading Engine]
        SM[Strategy Module]
        DM[Data Manager]
    end

    subgraph "Exchange Integration"
        FE[Firi Exchange]
        CF[Configuration]
    end

    subgraph "External Services"
        FA[Firi API]
        FS[Firestore]
    end

    subgraph "Domain Layer"
        CO[Coin]
        TR[Trade]
        PD[PriceData]
    end

    TE --> SM
    TE --> DM
    TE --> FE
    FE --> CF
    FE --> FA
    DM --> FS
    TE --> CO
    TE --> TR
    DM --> PD

    style TE fill:#e1f5fe
    style FE fill:#f3e5f5
    style FA fill:#e8f5e8
    style FS fill:#fff3e0

# Mermaid State Diagram
mermaid_state_diagram: |
  stateDiagram-v2
    [*] --> Initializing
    Initializing --> Authenticating
    Authenticating --> Connected
    Authenticating --> AuthFailed
    AuthFailed --> [*]
    
    Connected --> CollectingData
    CollectingData --> AnalyzingStrategy
    AnalyzingStrategy --> SignalGenerated
    AnalyzingStrategy --> NoSignal
    
    SignalGenerated --> ExecutingTrade
    ExecutingTrade --> TradeSuccess
    ExecutingTrade --> TradeFailed
    
    TradeSuccess --> CollectingData
    TradeFailed --> CollectingData
    NoSignal --> CollectingData
    
    CollectingData --> Error
    Error --> Retrying
    Retrying --> Connected
    Retrying --> [*]
    
    Connected --> [*]

# Mermaid Flowchart
mermaid_flowchart: |
  flowchart TD
    A[Start Trading Bot] --> B[Load Configuration]
    B --> C[Initialize Firi Exchange]
    C --> D[Authenticate with API]
    D --> E{Authentication Success?}
    E -->|No| F[Log Error & Exit]
    E -->|Yes| G[Start Data Collection]
    
    G --> H[Get Market Data]
    H --> I[Store in Firestore]
    I --> J[Get Historical Data]
    J --> K[Run Strategy Analysis]
    K --> L{Signal Generated?}
    
    L -->|No| M[Wait for Next Cycle]
    L -->|Yes| N[Execute Trade]
    
    M --> H
    N --> O{Trade Success?}
    O -->|No| P[Log Trade Error]
    O -->|Yes| Q[Store Trade Data]
    
    P --> M
    Q --> M
    
    H --> R{API Error?}
    R -->|Yes| S[Implement Retry Logic]
    R -->|No| H
    S --> H

# Configuration Examples
configuration_examples:
  basic_setup: |
    # config/firi_config.py
    FIRI_CONFIG = {
        'api_key': 'your_api_key_here',
        'client_id': 'your_client_id_here',
        'secret': 'your_secret_here',
        'base_url': 'https://api.firi.com',
        'sandbox': True  # Use True for testing
    }

  trading_config: |
    TRADING_CONFIG = {
        'default_symbols': ['BTC-NOK', 'ETH-NOK'],
        'max_position_size': 0.1,
        'risk_percentage': 2.0,
        'stop_loss_percentage': 5.0,
        'take_profit_percentage': 10.0
    }

  rate_limits: |
    RATE_LIMITS = {
        'requests_per_minute': 60,
        'requests_per_hour': 1000,
        'retry_delay': 1,
        'max_retries': 3
    }

# Usage Examples
usage_examples:
  basic_usage: |
    from src.exchange.firi_exchange import FiriExchange
    from config.firi_config import FIRI_CONFIG

    # Initialize exchange
    exchange = FiriExchange(
        api_key=FIRI_CONFIG['api_key'],
        client_id=FIRI_CONFIG['client_id'],
        secret=FIRI_CONFIG['secret']
    )

    # Test connection
    results = exchange.test_connection()

  trading_engine_integration: |
    from src.engine import TradingEngine
    from src.strategies.sma_cross import SmaCrossStrategy

    # Initialize strategy
    strategy = SmaCrossStrategy(short_window=5, long_window=20)

    # Create trading engine with Firi integration
    engine = TradingEngine(
        strategy=strategy,
        symbols=['BTC-NOK', 'ETH-NOK'],
        interval=60,
        project_id='your-firestore-project'
    )

    # Start trading
    engine.start()

  testing: |
    # Run comprehensive tests
    python examples/firi_test.py

    # Test specific functionality
    exchange = FiriExchange(...)
    results = exchange.test_connection()
    trading_results = exchange.test_trading_functionality()

# Error Codes and Handling
error_codes:
  authentication:
    - code: "AUTH_FAILED"
      description: "Invalid API credentials"
      solution: "Check API key, client ID, and secret"
      
  rate_limiting:
    - code: "RATE_LIMIT"
      description: "Too many requests"
      solution: "Implement exponential backoff"
      
  network:
    - code: "NETWORK_ERROR"
      description: "Connection issues"
      solution: "Check internet connection and retry"
      
  trading:
    - code: "INSUFFICIENT_FUNDS"
      description: "Not enough balance"
      solution: "Check account balance"
      
    - code: "INVALID_ORDER"
      description: "Order parameters invalid"
      solution: "Check order size and price"

# Monitoring and Logging
monitoring:
  metrics:
    - name: "API Response Time"
      description: "Time to get response from Firi API"
      unit: "milliseconds"
      
    - name: "Trade Success Rate"
      description: "Percentage of successful trades"
      unit: "percentage"
      
    - name: "Error Rate"
      description: "Percentage of API errors"
      unit: "percentage"
      
    - name: "Data Collection Rate"
      description: "Number of data points collected per hour"
      unit: "count"

  alerts:
    - condition: "API Error Rate > 5%"
      action: "Send email alert"
      
    - condition: "Trade Success Rate < 80%"
      action: "Pause trading and notify"
      
    - condition: "No data for 5 minutes"
      action: "Restart data collection"

# Deployment
deployment:
  requirements:
    - "Python 3.8+"
    - "google-cloud-firestore"
    - "requests"
    - "hmac"
    - "hashlib"
    
  environment_variables:
    - name: "FIRI_API_KEY"
      description: "Firi API key"
      required: true
      
    - name: "FIRI_CLIENT_ID"
      description: "Firi client ID"
      required: true
      
    - name: "FIRI_SECRET"
      description: "Firi secret key"
      required: true
      
    - name: "GOOGLE_APPLICATION_CREDENTIALS"
      description: "Path to Firestore credentials"
      required: true

  docker:
    image: "python:3.9-slim"
    ports:
      - "8000:8000"
    volumes:
      - "./config:/app/config"
      - "./logs:/app/logs"
    environment:
      - PYTHONPATH=/app/src 