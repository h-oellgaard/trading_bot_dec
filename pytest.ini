[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --no-cov-on-fail
    --ignore=venv
    --ignore=env
    --ignore=site-packages
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Tests that take longer to run
    async: Tests that require async support 