graph TD

  data_service[DataService<br><i>Fetches market data</i>]
  trading_engine[TradingEngine<br><i>Main loop & orchestrator</i>]
  strategy[Strategy<br><i>Generates trading signals</i>]
  exchange[Exchange<br><i>Executes trades</i>]

  data_service -->|Market Data| trading_engine
  trading_engine -->|Preprocessed Data| strategy
  strategy -->|Signal| trading_engine
  trading_engine -->|Trade| exchange
  exchange -->|Execution Result| trading_engine
