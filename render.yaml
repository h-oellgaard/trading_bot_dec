# Render Blueprint - Trading Bot Cron Job
# Live: TRADING_ENABLED true → real Firi orders; BUY_QUOTE_AMOUNT=200 DKK (quote) per buy.
# Env vars: FIRI_API_KEY, FIRI_SECRET, FIRI_CLIENT_ID, GOOGLE_APPLICATION_CREDENTIALS_JSON

services:
  - type: cron
    name: trading-bot-cron
    runtime: python
    branch: cronjob

    # Every hour (CANDLE_INTERVAL 1h)
    schedule: "0 * * * *"

    buildCommand: pip install -r requirements-prod.txt
    startCommand: python main.py --once

    envVars:
      - key: TRADING_ENABLED
        value: "true"
      - key: BUY_QUOTE_AMOUNT
        value: "200"
      - key: TRADING_PAIR
        value: "ETH/DKK"
      - key: FIREBASE_LOG_LEVEL
        value: "WARNING"
      - key: FIRI_API_KEY
        sync: false
      - key: FIRI_SECRET
        sync: false
      - key: FIRI_CLIENT_ID
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
